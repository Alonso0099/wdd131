<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review confirmation page showing your submitted product review details and the total number of completed reviews.">
  <meta name="author" content="Alonso Alvarado">
  <title>Review Submitted</title>
  <link rel="stylesheet" href="styles/form.css">
  <script src="scripts/review.js" defer></script>
</head>
<body>
  <header>
    <h1>Review Submitted</h1>
  </header>

  <main class="confirmation">
    <section class="card">
      <h2>Thank you for your review!</h2>
      <p>Your review has been submitted successfully.</p>
      <p><strong>Total Reviews Completed:</strong> <span id="reviewCount">0</span></p>
    </section>

    <section class="card">
      <h2>Submitted Information</h2>
      <div id="results"></div>
    </section>
  </main>

  <footer>
    <p>© <span id="currentYear"></span> Alonso Alvarado – Costa Rica</p>
    <p id="lastModified"></p>
  </footer>
</body>
</html>
